<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outreach Sequences</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f11;
    color: #e2e2e2;
    min-height: 100vh;
    padding: 32px 24px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 24px;
    color: #fff;
    letter-spacing: -0.3px;
  }

  /* Paste zone */
  .paste-zone {
    background: #1a1a1f;
    border: 1.5px dashed #333;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 24px;
    transition: border-color 0.2s;
  }
  .paste-zone:focus-within { border-color: #6c63ff; }
  .paste-zone label {
    display: block;
    font-size: 0.75rem;
    color: #888;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .paste-zone textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #ccc;
    font-size: 0.85rem;
    font-family: monospace;
    resize: none;
    height: 60px;
  }
  .paste-zone textarea::placeholder { color: #444; }
  .paste-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .btn-import {
    background: #6c63ff;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 7px 16px;
    font-size: 0.82rem;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-import:hover { background: #5a52e0; }
  .btn-import-csv {
    background: #4caf7d;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 7px 16px;
    font-size: 0.82rem;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-import-csv:hover { background: #3e9a6d; }
  .btn-clear-paste {
    background: transparent;
    color: #666;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 7px 16px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn-clear-paste:hover { color: #aaa; border-color: #555; }

  /* Toolbar */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .row-count { font-size: 0.8rem; color: #555; }
  .btn-add-row {
    background: transparent;
    color: #6c63ff;
    border: 1px solid #6c63ff44;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-add-row:hover { background: #6c63ff18; }
  .btn-export-csv {
    background: transparent;
    color: #4caf7d;
    border: 1px solid #4caf7d44;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-export-csv:hover { background: #4caf7d18; }
  .btn-backup {
    background: transparent;
    color: #e0a84c;
    border: 1px solid #e0a84c44;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-backup:hover { background: #e0a84c18; }
  .btn-restore {
    background: transparent;
    color: #888;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn-restore:hover { color: #aaa; border-color: #555; }
  .btn-clear-all {
    background: transparent;
    color: #e15b5b;
    border: 1px solid #e15b5b44;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-clear-all:hover { background: #e15b5b18; }
  .btn-delete-selected {
    background: transparent;
    color: #e15b5b;
    border: 1px solid #e15b5b44;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-delete-selected:hover { background: #e15b5b18; }
  .btn-add-col {
    background: transparent;
    color: #6c63ff;
    border: 1px solid #6c63ff44;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-add-col:hover { background: #6c63ff18; }

  /* Table */
  .table-wrap {
    background: #1a1a1f;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #222;
  }

  .table-header {
    display: grid;
    background: #141416;
    border-bottom: 1px solid #222;
    padding: 10px 16px;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #555;
    font-weight: 600;
  }

  /* Row */
  .row-item {
    border-bottom: 1px solid #1e1e22;
  }
  .row-item.selected .row-summary { background: #202028; }
  .row-item:last-child { border-bottom: none; }

  .row-summary {
    display: grid;
    align-items: center;
    padding: 11px 16px;
    cursor: pointer;
    transition: background 0.12s;
    gap: 8px;
  }
  .row-summary:hover { background: #1f1f26; }

  .row-summary .cell {
    font-size: 0.85rem;
    color: #ccc;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-summary .cell.row-num { color: #666; font-size: 0.78rem; }
  .row-summary .cell.email { color: #888; font-size: 0.8rem; }
  .row-select {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .row-select input { cursor: pointer; }
  .col-input {
    background: #141416;
    border: 1px solid #2a2a33;
    color: #ccc;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.82rem;
    width: 140px;
  }
  .columns-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
  }
  .col-pill {
    background: #1a1a1f;
    border: 1px solid #2a2a33;
    color: #aaa;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.74rem;
    cursor: grab;
    user-select: none;
  }
  .col-pill.dragging { opacity: 0.6; }
  .col-draggable { cursor: grab; }
  .col-draggable.dragging { opacity: 0.6; }

  .expand-icon {
    color: #444;
    font-size: 0.7rem;
    transition: transform 0.2s;
    justify-self: end;
    user-select: none;
  }
  .row-item.open .expand-icon { transform: rotate(180deg); color: #6c63ff; }

  /* Status badge */
  .status-badge {
    display: inline-block;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .status-not-started { background: #1e1e22; color: #666; }
  .status-in-progress { background: #1a1f35; color: #6c8fff; }
  .status-sent        { background: #0f2b1a; color: #4caf7d; }
  .status-replied     { background: #2b1a0f; color: #e08c4c; }

  .email-dots { display: flex; gap: 3px; align-items: center; }
  .email-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #2a2a32;
  }
  .email-dot.filled { background: #6c63ff; }
  .email-dot.partial { background: #6c63ff55; }

  /* Expanded panel */
  .row-detail {
    display: none;
    padding: 20px 20px 24px;
    background: #16161a;
    border-top: 1px solid #1e1e22;
  }
  .row-item.open .row-detail { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  @media(max-width: 900px) { .detail-grid { grid-template-columns: repeat(2, 1fr); } }
  @media(max-width: 600px) { .detail-grid { grid-template-columns: 1fr; } }

  .field-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
  }
  .field-group label {
    font-size: 0.7rem;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .copy-btn {
    background: transparent;
    border: none;
    color: #444;
    cursor: pointer;
    font-size: 0.68rem;
    padding: 1px 6px;
    border-radius: 3px;
    transition: color 0.15s, background 0.15s;
  }
  .copy-btn:hover { color: #aaa; background: #2a2a32; }
  .copy-btn.copied { color: #4caf7d; }
  .link-btn { color: #6c8fff; font-size: 0.8rem; }
  .link-btn:hover { color: #99b3ff; background: #6c8fff18; }
  .gmail-btn { color: #e0734c; }
  .gmail-btn:hover { color: #f0957a; background: #e0734c18; }
  .field-group input, .field-group select {
    width: 100%;
    background: #1e1e24;
    border: 1px solid #2a2a30;
    border-radius: 6px;
    padding: 8px 10px;
    color: #ddd;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .field-group input:focus, .field-group select:focus { border-color: #6c63ff88; }
  .field-group select option { background: #1e1e24; }

  /* Email sequence */
  .seq-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .seq-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #555;
    font-weight: 600;
  }
  .btn-add-email {
    background: transparent;
    color: #6c63ff;
    border: 1px solid #6c63ff44;
    border-radius: 5px;
    padding: 4px 12px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-add-email:hover { background: #6c63ff18; }

  .email-boxes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  @media(max-width: 1000px) { .email-boxes { grid-template-columns: repeat(2, 1fr); } }
  @media(max-width: 600px) { .email-boxes { grid-template-columns: 1fr; } }

  .email-box {
    background: #1a1a20;
    border: 1px solid #262630;
    border-radius: 8px;
    overflow: hidden;
  }
  .email-box-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: #1e1e26;
    border-bottom: 1px solid #262630;
  }
  .email-box-num {
    font-size: 0.72rem;
    color: #6c63ff;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .btn-remove-email {
    background: transparent;
    border: none;
    color: #444;
    cursor: pointer;
    font-size: 0.85rem;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.15s;
  }
  .btn-remove-email:hover { color: #e05c5c; }

  .email-box-subject input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid #262630;
    padding: 8px 12px;
    color: #ccc;
    font-size: 0.83rem;
    outline: none;
  }
  .email-box-subject input::placeholder { color: #3a3a44; }
  .email-box-subject input:focus { background: #1c1c24; }

  .email-box textarea {
    width: 100%;
    background: transparent;
    border: none;
    padding: 10px 12px;
    color: #bbb;
    font-size: 0.83rem;
    font-family: inherit;
    resize: vertical;
    outline: none;
    min-height: 300px;
    line-height: 1.55;
  }
  .email-box textarea::placeholder { color: #3a3a44; }
  .email-box textarea:focus { background: #1c1c24; }

  /* Row actions */
  .row-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    justify-content: flex-end;
  }
  .btn-save {
    background: #6c63ff;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 7px 18px;
    font-size: 0.82rem;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #5a52e0; }
  .btn-drafts {
    background: transparent;
    color: #e0a84c;
    border: 1px solid #e0a84c44;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 0.82rem;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-drafts:hover { background: #e0a84c18; }
  .btn-drafts:disabled { opacity: 0.5; cursor: default; }
  .btn-delete-row {
    background: transparent;
    color: #666;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: color 0.15s;
  }
  .btn-delete-row:hover { color: #e05c5c; border-color: #e05c5c44; }

  .save-flash {
    font-size: 0.78rem;
    color: #4caf7d;
    opacity: 0;
    transition: opacity 0.3s;
    align-self: center;
  }
  .save-flash.show { opacity: 1; }

  .empty-state {
    padding: 40px;
    text-align: center;
    color: #444;
    font-size: 0.9rem;
  }

  /* Analytics */
  .analytics-section {
    background: #1a1a1f;
    border: 1px solid #222;
    border-radius: 10px;
    margin-bottom: 18px;
    overflow: hidden;
  }
  .analytics-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }
  .analytics-header:hover { background: #1f1f26; }
  .analytics-title {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #555;
    font-weight: 600;
  }
  .analytics-toggle { color: #444; font-size: 0.7rem; transition: transform 0.2s; }
  .analytics-section.open .analytics-toggle { transform: rotate(180deg); color: #6c63ff; }
  .analytics-body { display: none; padding: 4px 16px 16px; }
  .analytics-section.open .analytics-body { display: block; }
  .analytics-stats {
    display: flex;
    gap: 32px;
    margin-bottom: 16px;
    padding: 12px 0;
    border-bottom: 1px solid #1e1e22;
  }
  .stat-box { text-align: left; }
  .stat-value { font-size: 1.5rem; font-weight: 600; color: #fff; line-height: 1; }
  .stat-label { font-size: 0.68rem; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
  .seq-bars { display: flex; flex-direction: column; gap: 8px; }
  .seq-bar-row { display: flex; align-items: center; gap: 10px; }
  .seq-bar-label { font-size: 0.75rem; color: #666; width: 54px; flex-shrink: 0; }
  .seq-bar-track { flex: 1; background: #1e1e24; border-radius: 3px; height: 7px; }
  .seq-bar-fill { height: 7px; border-radius: 3px; background: #4caf7d; transition: width 0.4s; }
  .seq-bar-count { font-size: 0.73rem; color: #555; width: 48px; text-align: right; flex-shrink: 0; }

  /* Email dot opened state */
  .email-dot.opened { background: #4caf7d; }

  /* Per-row open timeline */
  .open-timeline {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid #1e1e22;
  }
  .open-timeline-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #555;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .timeline-rows { display: flex; flex-direction: column; gap: 6px; }
  .timeline-row { display: flex; align-items: center; gap: 10px; font-size: 0.82rem; }
  .timeline-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: #2a2a32; }
  .timeline-dot.opened { background: #4caf7d; }
  .timeline-dot.filled { background: #6c63ff; }
  .timeline-seq { color: #555; font-size: 0.75rem; width: 52px; flex-shrink: 0; }
  .timeline-status { color: #ccc; flex: 1; }
  .timeline-status.opened { color: #4caf7d; }
  .timeline-time { color: #444; font-size: 0.73rem; }

  .sheets-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #1a1a1f;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 10px 16px;
    margin-bottom: 18px;
  }
  .sheets-bar label {
    font-size: 0.72rem;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .sheets-bar input {
    flex: 1;
    background: #141416;
    border: 1px solid #2a2a33;
    border-radius: 6px;
    padding: 6px 10px;
    color: #ccc;
    font-size: 0.82rem;
    outline: none;
  }
  .sheets-bar input:focus { border-color: #6c63ff88; }
  .sheets-status {
    font-size: 0.75rem;
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }
  .sheets-status.ok  { color: #4caf7d; }
  .sheets-status.err { color: #e05c5c; }
  .sheets-status.syncing { color: #888; }

  /* Templates */
  .templates-section {
    background: #1a1a1f;
    border: 1px solid #2a2a33;
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .templates-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }
  .templates-header:hover { background: #1f1f26; }
  .templates-title { font-size: 0.82rem; font-weight: 600; color: #ccc; }
  .templates-toggle { font-size: 0.65rem; color: #555; transition: transform 0.2s; }
  .templates-section.open .templates-toggle { transform: rotate(180deg); }
  .templates-body { display: none; padding: 0 16px 16px; border-top: 1px solid #222; }
  .templates-section.open .templates-body { display: block; }
  .tmpl-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .tmpl-select {
    flex: 1; min-width: 140px;
    background: #111; border: 1px solid #2a2a33; border-radius: 6px;
    padding: 6px 10px; color: #ccc; font-size: 0.82rem; outline: none;
  }
  .tmpl-name-input {
    width: 100%; background: #111; border: 1px solid #2a2a33; border-radius: 6px;
    padding: 6px 10px; color: #ccc; font-size: 0.82rem; outline: none; margin-bottom: 8px;
  }
  .tmpl-name-input:focus, .tmpl-select:focus { border-color: #6c63ff88; }
  .tmpl-subject {
    width: 100%; background: #111; border: 1px solid #2a2a33; border-radius: 6px;
    padding: 7px 10px; color: #ccc; font-size: 0.82rem; outline: none; margin-bottom: 8px;
  }
  .tmpl-subject:focus { border-color: #6c63ff88; }
  .tmpl-textarea {
    width: 100%; background: #111; border: 1px solid #2a2a33; border-radius: 6px;
    padding: 8px 10px; color: #ccc; font-size: 0.82rem; resize: vertical;
    min-height: 90px; outline: none; font-family: inherit; margin-bottom: 8px;
  }
  .tmpl-textarea:focus { border-color: #6c63ff88; }
  .tmpl-vars { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; align-items: center; }
  .tmpl-var-label { font-size: 0.72rem; color: #666; margin-right: 2px; }
  .tmpl-var-chip {
    background: #252530; border: 1px solid #333; border-radius: 4px;
    padding: 3px 8px; font-size: 0.75rem; color: #aaa; cursor: pointer;
    font-family: monospace; transition: background 0.1s, color 0.1s;
  }
  .tmpl-var-chip:hover { background: #2e2e40; color: #c0b8ff; border-color: #555; }
  .tmpl-apply-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .tmpl-seq-label { font-size: 0.8rem; color: #888; white-space: nowrap; }
  .tmpl-seq-input {
    width: 48px; background: #111; border: 1px solid #2a2a33; border-radius: 6px;
    padding: 5px 8px; color: #ccc; font-size: 0.82rem; outline: none; text-align: center;
  }
  .tmpl-checkbox-label { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; color: #888; cursor: pointer; }
  .btn-tmpl-save {
    background: #6c63ff; color: #fff; border: none; border-radius: 6px;
    padding: 6px 14px; font-size: 0.8rem; cursor: pointer; font-weight: 500;
  }
  .btn-tmpl-save:hover { background: #5a52e0; }
  .btn-tmpl-apply {
    background: #4caf7d; color: #fff; border: none; border-radius: 6px;
    padding: 6px 14px; font-size: 0.8rem; cursor: pointer; font-weight: 500;
  }
  .btn-tmpl-apply:hover { background: #3e9a6d; }
  .btn-tmpl-delete {
    background: transparent; color: #666; border: 1px solid #333; border-radius: 6px;
    padding: 6px 12px; font-size: 0.8rem; cursor: pointer;
  }
  .btn-tmpl-delete:hover { color: #e05c5c; border-color: #e05c5c44; }
  .tmpl-seq-block {
    background: #111;
    border: 1px solid #2a2a33;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .tmpl-seq-num {
    font-size: 0.72rem;
    font-weight: 600;
    color: #6c63ff;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 7px;
  }
</style>
</head>
<body>

<h1>📬 Outreach Sequences</h1>

<!-- Google Sheets sync -->
<div class="sheets-bar">
  <label>Sheets Script URL</label>
  <input type="text" id="sheetsUrl" placeholder="Paste your Apps Script web app URL here..."
    value="" oninput="localStorage.setItem('sheets_script_url', this.value)" style="flex:2">
  <input type="text" id="sheetsName" placeholder="Sheet name (e.g. SF 1840 10th Ave)"
    value="" oninput="localStorage.setItem('sheets_sheet_name', this.value)" style="flex:1">
  <span class="sheets-status" id="sheetsStatus"></span>
</div>

<!-- Analytics -->
<div class="analytics-section" id="analyticsSection" style="display:none">
  <div class="analytics-header" onclick="this.parentElement.classList.toggle('open')">
    <span class="analytics-title">Open Tracking</span>
    <span class="analytics-toggle">▼</span>
  </div>
  <div class="analytics-body">
    <div id="analyticsContent"></div>
  </div>
</div>

<!-- Templates -->
<div class="templates-section open" id="templatesSection">
  <div class="templates-header" onclick="this.parentElement.classList.toggle('open')">
    <span class="templates-title">Email Templates</span>
    <span class="templates-toggle">▼</span>
  </div>
  <div class="templates-body">
    <div class="tmpl-row" style="margin-top:12px">
      <select class="tmpl-select" id="tmplSelect" onchange="loadTemplate()">
        <option value="">Load saved template...</option>
      </select>
      <button class="btn-tmpl-delete" onclick="deleteTemplate()">Delete</button>
    </div>
    <input type="text" class="tmpl-name-input" id="tmplName" placeholder="Template name...">
    <div class="tmpl-vars" id="tmplVars">
      <span class="tmpl-var-label">Insert variable:</span>
    </div>
    <div id="tmplSeqList">
      <div class="tmpl-seq-block">
        <div class="tmpl-seq-num">Email 1</div>
        <input type="text" class="tmpl-subject" data-seq="0" placeholder="Subject...">
        <textarea class="tmpl-textarea" data-seq="0" placeholder="Body... e.g. Hi {{Name}}, I work with sellers in {{City}}..."></textarea>
      </div>
      <div class="tmpl-seq-block">
        <div class="tmpl-seq-num">Email 2</div>
        <input type="text" class="tmpl-subject" data-seq="1" placeholder="Subject...">
        <textarea class="tmpl-textarea" data-seq="1" placeholder="Body..."></textarea>
      </div>
      <div class="tmpl-seq-block">
        <div class="tmpl-seq-num">Email 3</div>
        <input type="text" class="tmpl-subject" data-seq="2" placeholder="Subject...">
        <textarea class="tmpl-textarea" data-seq="2" placeholder="Body..."></textarea>
      </div>
      <div class="tmpl-seq-block">
        <div class="tmpl-seq-num">Email 4</div>
        <input type="text" class="tmpl-subject" data-seq="3" placeholder="Subject...">
        <textarea class="tmpl-textarea" data-seq="3" placeholder="Body..."></textarea>
      </div>
    </div>
    <div class="tmpl-apply-row" style="margin-top:10px">
      <label class="tmpl-checkbox-label">
        <input type="checkbox" id="tmplOnlySelected"> Selected contacts only
      </label>
      <div style="flex:1"></div>
      <button class="btn-tmpl-save" onclick="saveTemplate()">Save Template</button>
      <button class="btn-tmpl-apply" onclick="applyTemplate()">Apply All to Contacts</button>
    </div>
  </div>
</div>

<!-- Paste zone -->
<div class="paste-zone">
  <label>Paste from Google Sheets (include header row) or import CSV</label>
  <textarea id="pasteArea" placeholder="Copy rows from Google Sheets and paste here..."></textarea>
  <div class="paste-actions">
    <button class="btn-import" onclick="importPaste()">Import Rows</button>
    <button class="btn-import-csv" onclick="document.getElementById('csvInput').click()">Import CSV</button>
    <button class="btn-clear-paste" onclick="clearPaste()">Clear</button>
    <input type="file" id="csvInput" accept=".csv,text/csv" style="display:none" onchange="importCSV(this)">
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div style="display:flex;align-items:center;gap:10px">
    <span class="row-count" id="rowCount">0 contacts</span>
    <span id="autoSaveIndicator" style="font-size:0.72rem;color:#4caf7d;opacity:0;transition:opacity 0.4s;">Auto-saved</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <div style="display:flex;gap:6px;align-items:center">
      <input type="text" id="newColumnName" class="col-input" placeholder="New column"
        onkeydown="if(event.key==='Enter'){addColumn()}">
      <button class="btn-add-col" onclick="addColumn()">Add Column</button>
    </div>
    <button class="btn-backup" onclick="backupJSON()">Backup</button>
    <button class="btn-restore" onclick="document.getElementById('restoreInput').click()">Restore</button>
    <input type="file" id="restoreInput" accept=".json" style="display:none" onchange="restoreJSON(this)">
    <button class="btn-export-csv" onclick="exportCSV()">Export CSV</button>
    <button class="btn-delete-selected" onclick="deleteSelected()">Delete Selected</button>
    <button class="btn-clear-all" onclick="clearAllContacts()">Clear All</button>
    <button class="btn-add-row" onclick="addBlankRow()">+ Add Row</button>
  </div>
</div>

<div class="columns-bar" id="columnsBar"></div>

<!-- Table -->
<div class="table-wrap" id="tableWrap">
  <div class="table-header" id="tableHeader" style="display:none"></div>
  <div id="rowList">
    <div class="empty-state">No contacts yet — paste from Google Sheets or add a row manually.</div>
  </div>
</div>

<script>
let contacts = JSON.parse(localStorage.getItem('outreach_contacts') || '[]');
let columns = JSON.parse(localStorage.getItem('outreach_columns') || '["Name","Email","Company","Status"]');
let selectedIds = new Set();
let dragColIndex = null;
let opensData = [];
let autoSaveTimer = null;
let templates = JSON.parse(localStorage.getItem('outreach_templates') || '[]');

function saveTemplates() {
  localStorage.setItem('outreach_templates', JSON.stringify(templates));
}

function renderTemplateVars() {
  const el = document.getElementById('tmplVars');
  if (!el) return;
  el.innerHTML = '<span class="tmpl-var-label">Insert variable:</span>' +
    columns.map(col =>
      `<button class="tmpl-var-chip" onclick="insertVar('${escHtmlAttr(col)}')">${escHtml(col)}</button>`
    ).join('');
}

function escHtmlAttr(str) {
  return String(str).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

let lastTmplFocus = null;

document.addEventListener('focusin', e => {
  if (e.target && e.target.closest('#tmplSeqList')) {
    lastTmplFocus = e.target;
  }
});

function insertVar(varName) {
  const target = lastTmplFocus || document.querySelector('#tmplSeqList .tmpl-textarea');
  if (!target) return;
  const token = '{{' + varName + '}}';
  const start = target.selectionStart;
  const end = target.selectionEnd;
  target.value = target.value.slice(0, start) + token + target.value.slice(end);
  target.selectionStart = target.selectionEnd = start + token.length;
  target.focus();
}

function renderTemplateDropdown() {
  const sel = document.getElementById('tmplSelect');
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">Load saved template...</option>' +
    templates.map(t =>
      `<option value="${t.id}" ${String(t.id) === cur ? 'selected' : ''}>${escHtml(t.name)}</option>`
    ).join('');
}

function getTmplSequences() {
  const subjects = document.querySelectorAll('#tmplSeqList .tmpl-subject');
  const bodies = document.querySelectorAll('#tmplSeqList .tmpl-textarea');
  const seqs = [];
  subjects.forEach((el, i) => {
    seqs.push({ subject: el.value, body: bodies[i] ? bodies[i].value : '' });
  });
  return seqs;
}

function setTmplSequences(seqs) {
  const subjects = document.querySelectorAll('#tmplSeqList .tmpl-subject');
  const bodies = document.querySelectorAll('#tmplSeqList .tmpl-textarea');
  subjects.forEach((el, i) => { el.value = seqs[i] ? seqs[i].subject || '' : ''; });
  bodies.forEach((el, i) => { el.value = seqs[i] ? seqs[i].body || '' : ''; });
}

function saveTemplate() {
  const name = document.getElementById('tmplName').value.trim();
  if (!name) { alert('Enter a template name first.'); return; }
  const sequences = getTmplSequences();
  const existing = templates.findIndex(t => t.name === name);
  if (existing >= 0) {
    templates[existing] = { ...templates[existing], sequences };
  } else {
    templates.push({ id: Date.now(), name, sequences });
  }
  saveTemplates();
  renderTemplateDropdown();
  const btn = document.querySelector('.btn-tmpl-save');
  if (btn) { const orig = btn.textContent; btn.textContent = 'Saved ✓'; setTimeout(() => { btn.textContent = orig; }, 1500); }
}

function loadTemplate() {
  const sel = document.getElementById('tmplSelect');
  const id = Number(sel.value);
  if (!id) return;
  const t = templates.find(t => t.id === id);
  if (!t) return;
  document.getElementById('tmplName').value = t.name;
  // support old single-email format
  if (t.sequences) {
    setTmplSequences(t.sequences);
  } else {
    setTmplSequences([{ subject: t.subject || '', body: t.body || '' }]);
  }
}

function deleteTemplate() {
  const sel = document.getElementById('tmplSelect');
  const id = Number(sel.value);
  if (!id) { alert('Select a saved template to delete.'); return; }
  if (!confirm('Delete this template?')) return;
  templates = templates.filter(t => t.id !== id);
  saveTemplates();
  renderTemplateDropdown();
  document.getElementById('tmplName').value = '';
  setTmplSequences([]);
}

function applyTemplate() {
  const seqs = getTmplSequences();
  const hasContent = seqs.some(s => s.subject || s.body);
  if (!hasContent) { alert('All email slots are empty — fill in at least one subject or body.'); return; }
  const onlySelected = document.getElementById('tmplOnlySelected').checked;
  const targets = onlySelected && selectedIds.size > 0
    ? contacts.filter(c => selectedIds.has(c.id))
    : contacts;
  if (targets.length === 0) { alert('No contacts to apply to.'); return; }

  const openRows = [...document.querySelectorAll('.row-item.open')].map(el => el.id);

  targets.forEach(c => {
    seqs.forEach((seq, seqIdx) => {
      if (!seq.subject && !seq.body) return;
      let s = seq.subject, b = seq.body;
      columns.forEach(col => {
        const val = c.data[col] || '';
        const re = new RegExp('\\{\\{' + col.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\}\\}', 'gi');
        s = s.replace(re, val);
        b = b.replace(re, val);
      });
      while (c.sequences.length <= seqIdx) {
        c.sequences.push({ id: Date.now() + Math.random(), subject: '', body: '', to: getEmail(c) });
      }
      c.sequences[seqIdx].subject = s;
      c.sequences[seqIdx].body = b;
    });
  });

  save();
  render();
  openRows.forEach(id => document.getElementById(id)?.classList.add('open'));

  // stagger syncs to avoid hitting Google's rate limit
  const statusEl = document.getElementById('sheetsStatus');
  targets.forEach((c, i) => {
    const ci = contacts.indexOf(c);
    if (ci < 0) return;
    setTimeout(() => {
      syncToSheets(ci);
      if (statusEl) {
        statusEl.textContent = `Syncing ${i + 1}/${targets.length}...`;
        statusEl.className = 'sheets-status syncing';
      }
    }, i * 300);
  });

  const btn = document.querySelector('.btn-tmpl-apply');
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = `Applied to ${targets.length} ✓`;
    btn.style.background = '#3e9a6d';
    setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 2000);
  }
}

function scheduleSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    save();
    const indicator = document.getElementById('autoSaveIndicator');
    if (indicator) {
      indicator.textContent = 'Auto-saved';
      indicator.style.opacity = '1';
      setTimeout(() => { indicator.style.opacity = '0'; }, 1500);
    }
  }, 2000);
}

function save() {
  localStorage.setItem('outreach_contacts', JSON.stringify(contacts));
  localStorage.setItem('outreach_columns', JSON.stringify(columns));
}

function detectEmailCol() {
  return columns.findIndex(c => c.toLowerCase().includes('email'));
}

function detectNameCol() {
  return columns.findIndex(c => c.toLowerCase().includes('name'));
}

function importPaste() {
  const raw = document.getElementById('pasteArea').value.trim();
  if (!raw) return;
  const lines = raw.split('\n').map(l => l.split('\t'));
  if (lines.length < 1) return;

  // First row = headers
  const headers = lines[0].map(h => h.trim());
  columns = headers.length > 1 ? headers : columns;

  const rows = lines.slice(1);
  rows.forEach(cells => {
    if (cells.every(c => !c.trim())) return;
    const rowData = {};
    columns.forEach((col, i) => { rowData[col] = (cells[i] || '').trim(); });
    contacts.push({
      id: Date.now() + Math.random(),
      data: rowData,
      status: rowData['Status'] || 'not-started',
      sequences: defaultSequences(rowData)
    });
  });

  save();
  render();
  clearPaste();
}

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i + 1] === '"') { cell += '"'; i++; }
        else { inQuotes = false; }
      } else {
        cell += ch;
      }
      continue;
    }
    if (ch === '"') { inQuotes = true; continue; }
    if (ch === ',') { row.push(cell); cell = ''; continue; }
    if (ch === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; continue; }
    if (ch === '\r') { continue; }
    cell += ch;
  }
  row.push(cell);
  rows.push(row);
  while (rows.length && rows[rows.length - 1].every(c => !String(c).trim())) rows.pop();
  return rows;
}

function importCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const rows = parseCSV(String(e.target.result || ''));
    if (rows.length < 1) return;
    const headers = rows[0].map(h => String(h || '').trim());
    const headerIndex = {};
    headers.forEach((h, i) => { if (h && headerIndex[h] == null) headerIndex[h] = i; });

    const statusIdx = headers.findIndex(h => h.toLowerCase() === 'outreach_status');
    const seqCols = {};
    let maxSeq = 0;
    headers.forEach((h, i) => {
      const m = h.match(/^(subject|email)(\d+)$/i);
      if (!m) return;
      const idx = parseInt(m[2], 10);
      maxSeq = Math.max(maxSeq, idx);
      const key = m[1].toLowerCase();
      if (!seqCols[idx]) seqCols[idx] = {};
      seqCols[idx][key] = i;
    });

    const baseColumns = headers.filter((h, i) => {
      if (!h) return false;
      if (i === statusIdx) return false;
      if (/^(subject|email)\d+$/i.test(h)) return false;
      return true;
    });
    if (baseColumns.length > 0) columns = baseColumns;

    rows.slice(1).forEach(cells => {
      if (cells.every(c => !String(c).trim())) return;
      const rowData = {};
      columns.forEach(col => {
        const idx = headerIndex[col];
        rowData[col] = idx != null ? String(cells[idx] ?? '').trim() : '';
      });
      let status = 'not-started';
      if (statusIdx >= 0) status = String(cells[statusIdx] ?? '').trim() || 'not-started';
      else {
        const statusCol = columns.find(c => c.toLowerCase() === 'status');
        if (statusCol) status = String(rowData[statusCol] || '').trim() || 'not-started';
      }

      let sequences = [];
      if (maxSeq > 0) {
        const emailIdx = detectEmailCol();
        const toEmail = emailIdx >= 0 ? rowData[columns[emailIdx]] || '' : '';
        for (let i = 1; i <= maxSeq; i++) {
          const subjectIdx = seqCols[i]?.subject;
          const bodyIdx = seqCols[i]?.email;
          sequences.push({
            id: Date.now() + Math.random(),
            subject: subjectIdx != null ? String(cells[subjectIdx] ?? '').trim() : '',
            body: bodyIdx != null ? String(cells[bodyIdx] ?? '').trim() : '',
            to: toEmail
          });
        }
      } else {
        sequences = defaultSequences(rowData);
      }

      contacts.push({
        id: Date.now() + Math.random(),
        data: rowData,
        status: status,
        sequences: sequences
      });
    });

    save();
    render();
    input.value = '';
  };
  reader.readAsText(file);
}

function defaultSequences(rowData) {
  const emailIdx = detectEmailCol();
  const email = emailIdx >= 0 ? rowData[columns[emailIdx]] || '' : '';
  return [1,2,3,4].map(n => ({
    id: n,
    subject: '',
    body: '',
    to: email
  }));
}

function clearPaste() {
  document.getElementById('pasteArea').value = '';
}

function addBlankRow() {
  const rowData = {};
  columns.forEach(c => rowData[c] = '');
  contacts.push({
    id: Date.now() + Math.random(),
    data: rowData,
    status: 'not-started',
    sequences: defaultSequences(rowData)
  });
  save();
  render();
  // auto-open the new row
  setTimeout(() => {
    const items = document.querySelectorAll('.row-item');
    if (items.length) toggleRow(items[items.length - 1]);
  }, 50);
}

function toggleRow(el) {
  el.classList.toggle('open');
}

function getEmail(contact) {
  const idx = detectEmailCol();
  return idx >= 0 ? contact.data[columns[idx]] || '' : '';
}

function getName(contact) {
  const idx = detectNameCol();
  return idx >= 0 ? contact.data[columns[idx]] || '(no name)' : Object.values(contact.data)[0] || '(no name)';
}

function statusClass(s) {
  const map = { 'not-started':'not-started','in-progress':'in-progress','sent':'sent','replied':'replied' };
  return 'status-' + (map[s] || 'not-started');
}
function statusLabel(s) {
  const map = { 'not-started':'Not Started','in-progress':'In Progress','sent':'Sent','replied':'Replied' };
  return map[s] || s;
}

function render() {
  const listEl = document.getElementById('rowList');
  const headerEl = document.getElementById('tableHeader');
  const countEl = document.getElementById('rowCount');
  const columnsBar = document.getElementById('columnsBar');
  countEl.textContent = contacts.length + ' contact' + (contacts.length !== 1 ? 's' : '');

  if (columnsBar) {
    columnsBar.innerHTML = columns.map((c, i) =>
      `<span class="col-pill" draggable="true" data-col-index="${i}"
        ondragstart="onColDragStart(event)"
        ondragover="onColDragOver(event)"
        ondrop="onColDrop(event)"
        ondragend="onColDragEnd(event)">${escHtml(c)}</span>`
    ).join('');
  }

  renderTemplateVars();
  renderTemplateDropdown();

  if (contacts.length === 0) {
    listEl.innerHTML = '<div class="empty-state">No contacts yet — paste from Google Sheets or add a row manually.</div>';
    headerEl.style.display = 'none';
    return;
  }

  // header
  const colCount = columns.length;
  const gridCols = `32px 28px repeat(${Math.min(colCount, 4)}, 1fr) 80px 50px 24px`;
  headerEl.style.display = 'grid';
  headerEl.style.gridTemplateColumns = gridCols;
  headerEl.innerHTML =
    '<span>#</span>' +
    '<span class="row-select"><input type="checkbox" onchange="toggleSelectAll(event)"></span>' +
    columns.slice(0, 4).map((c, i) =>
      `<span class="col-draggable" draggable="true" data-col-index="${i}"
        ondragstart="onColDragStart(event)"
        ondragover="onColDragOver(event)"
        ondrop="onColDrop(event)"
        ondragend="onColDragEnd(event)">${c}</span>`
    ).join('') +
    '<span>Status</span><span>Emails</span><span></span>';
  const selectAllEl = headerEl.querySelector('input[type="checkbox"]');
  if (selectAllEl) {
    selectAllEl.checked = contacts.length > 0 && selectedIds.size === contacts.length;
    selectAllEl.indeterminate = selectedIds.size > 0 && selectedIds.size < contacts.length;
  }

  listEl.innerHTML = contacts.map((c, ci) => {
    const email = getEmail(c);
    const nameCells = columns.slice(0, 4).map(col => {
      const isEmail = col.toLowerCase().includes('email');
      return `<div class="cell ${isEmail ? 'email' : ''}">${c.data[col] || '—'}</div>`;
    }).join('');

    const seqHTML = c.sequences.map((seq, si) => `
      <div class="email-box" data-ci="${ci}" data-si="${si}">
        <div class="email-box-header">
          <span class="email-box-num">Email ${si + 1}</span>
          <div style="display:flex;gap:4px;align-items:center">
            <button class="copy-btn" onclick="copyText(contacts[${ci}].sequences[${si}].subject,this)" title="Copy subject">Subj</button>
            <button class="copy-btn" onclick="copyText(contacts[${ci}].sequences[${si}].body,this)" title="Copy body">Body</button>
            <button class="copy-btn gmail-btn" onclick="openGmail(${ci},${si})" title="Open in Gmail">Gmail</button>
            <button class="btn-remove-email" onclick="removeSeq(${ci},${si})" title="Remove">✕</button>
          </div>
        </div>
        <div class="email-box-subject">
          <input type="text" placeholder="Subject line..." value="${escHtml(seq.subject)}"
            oninput="contacts[${ci}].sequences[${si}].subject=this.value;scheduleSave()">
        </div>
        <textarea placeholder="Write your email body here..."
          oninput="contacts[${ci}].sequences[${si}].body=this.value;scheduleSave()">${escHtml(seq.body)}</textarea>
      </div>
    `).join('');

    const fieldInputs = columns.map(col => {
      const val = c.data[col] || '';
      const isLink = /^https?:\/\//i.test(val);
      return `
      <div class="field-group">
        <div class="field-label-row">
          <label>${col}</label>
          <div style="display:flex;gap:3px;align-items:center">
            ${isLink ? `<button class="copy-btn link-btn" onclick="openLink(${ci},'${escHtml(col)}')" title="Open link">↗</button>` : ''}
            <button class="copy-btn" onclick="copyField(${ci},'${escHtml(col)}',this)">Copy</button>
          </div>
        </div>
        <input type="text" value="${escHtml(val)}"
          oninput="contacts[${ci}].data['${escHtml(col)}']=this.value${col.toLowerCase().includes('email') ? `;syncEmail(${ci})` : ''};scheduleSave()">
      </div>`;
    }).join('');

    const rowNum = ci + 1;
    const checked = selectedIds.has(c.id) ? 'checked' : '';
    return `
    <div class="row-item ${selectedIds.has(c.id) ? 'selected' : ''}" id="row-${ci}">
      <div class="row-summary" style="grid-template-columns:${gridCols}" onclick="toggleRow(this.parentElement)">
        <div class="cell row-num">${rowNum}</div>
        <div class="cell row-select"><input type="checkbox" ${checked} onchange="toggleSelect(${ci}, event)"></div>
        ${nameCells}
        <div class="cell">
          <span class="status-badge ${statusClass(c.status)}">${statusLabel(c.status)}</span>
        </div>
        <div class="cell">
          <div class="email-dots">
            ${c.sequences.map((s, si) => {
              const op = getContactOpen(ci, si);
              const cls = op && op.openCount > 0 ? 'opened' : s.subject && s.body ? 'filled' : s.subject || s.body ? 'partial' : '';
              const title = op && op.openCount > 0 ? `Email ${si+1}: opened ${op.openCount}×` : s.subject || s.body ? `Email ${si+1}: filled` : `Email ${si+1}: empty`;
              return `<div class="email-dot ${cls}" title="${title}"></div>`;
            }).join('')}
          </div>
        </div>
        <div class="expand-icon">▼</div>
      </div>
      <div class="row-detail">
        <div class="detail-grid">
          ${fieldInputs}
          <div class="field-group">
            <label>Status</label>
            <select onchange="contacts[${ci}].status=this.value;rerenderRow(${ci});scheduleSave()">
              ${['not-started','in-progress','sent','replied'].map(s =>
                `<option value="${s}" ${c.status===s?'selected':''}>${statusLabel(s)}</option>`
              ).join('')}
            </select>
          </div>
        </div>
        <div class="seq-header">
          <span class="seq-label">Email Sequence (${c.sequences.length})</span>
          <button class="btn-add-email" onclick="addSeq(${ci})">+ Add Email</button>
        </div>
        <div class="email-boxes">${seqHTML}</div>
        ${buildTimeline(ci, c)}
        <div class="row-actions">
          <span class="save-flash" id="flash-${ci}">Saved ✓</span>
          <button class="btn-delete-row" onclick="deleteRow(${ci})">Delete</button>
          <button class="btn-drafts" id="drafts-${ci}" onclick="createDrafts(${ci})">Create Drafts</button>
          <button class="btn-save" onclick="saveRow(${ci})">Save</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function syncEmail(ci) {
  const email = getEmail(contacts[ci]);
  contacts[ci].sequences.forEach(s => s.to = email);
}

function addSeq(ci) {
  const email = getEmail(contacts[ci]);
  contacts[ci].sequences.push({ id: Date.now(), subject: '', body: '', to: email });
  save();
  const wasOpen = document.getElementById('row-' + ci)?.classList.contains('open');
  render();
  if (wasOpen) document.getElementById('row-' + ci)?.classList.add('open');
}

function removeSeq(ci, si) {
  if (contacts[ci].sequences.length <= 1) return;
  contacts[ci].sequences.splice(si, 1);
  save();
  const wasOpen = document.getElementById('row-' + ci)?.classList.contains('open');
  render();
  if (wasOpen) document.getElementById('row-' + ci)?.classList.add('open');
}

function saveRow(ci) {
  save();
  rerenderRow(ci);
  const flash = document.getElementById('flash-' + ci);
  if (flash) { flash.classList.add('show'); setTimeout(() => flash.classList.remove('show'), 1800); }
  syncToSheets(ci);
}

async function syncToSheets(ci) {
  const url = (localStorage.getItem('sheets_script_url') || '').trim();
  if (!url) return;

  const c = contacts[ci];
  const companyIdx = columns.findIndex(col => col.toLowerCase().includes('company'));
  const phoneIdx   = columns.findIndex(col => col.toLowerCase().includes('phone'));
  const nameIdx    = columns.findIndex(col => col.toLowerCase() === 'first name');

  if (companyIdx === -1 || phoneIdx === -1) return;

  const statusEl = document.getElementById('sheetsStatus');
  if (statusEl) { statusEl.textContent = 'Syncing...'; statusEl.className = 'sheets-status syncing'; }

  const sheetName = (localStorage.getItem('sheets_sheet_name') || '').trim();
  const payload = {
    name:      nameIdx >= 0 ? c.data[columns[nameIdx]] || '' : '',
    company:   c.data[columns[companyIdx]] || '',
    phone:     c.data[columns[phoneIdx]]   || '',
    sheetName: sheetName,
    sequences: c.sequences.map((s, i) => ({
      index:   i + 1,
      subject: s.subject || '',
      body:    s.body    || ''
    }))
  };

  try {
    const form = new URLSearchParams({ data: JSON.stringify(payload) });
    await fetch(url, {
      method: 'POST',
      mode: 'no-cors',
      body: form
    });
    if (statusEl) { statusEl.textContent = 'Synced ✓'; statusEl.className = 'sheets-status ok'; }
    setTimeout(() => { if (statusEl) { statusEl.textContent = ''; statusEl.className = 'sheets-status'; } }, 3000);
  } catch (err) {
    if (statusEl) { statusEl.textContent = 'Sync failed'; statusEl.className = 'sheets-status err'; }
    console.error('Sheets sync error:', err);
  }
}

function addColumn() {
  const input = document.getElementById('newColumnName');
  if (!input) return;
  const name = input.value.trim();
  if (!name) return;
  const exists = columns.some(c => c.toLowerCase() === name.toLowerCase());
  if (exists) { alert('Column already exists.'); return; }
  columns.push(name);
  contacts.forEach(c => {
    if (!Object.prototype.hasOwnProperty.call(c.data, name)) c.data[name] = '';
  });
  save();
  render();
  input.value = '';
}

function onColDragStart(evt) {
  const idx = parseInt(evt.currentTarget.dataset.colIndex, 10);
  if (Number.isNaN(idx)) return;
  dragColIndex = idx;
  evt.dataTransfer.effectAllowed = 'move';
  evt.dataTransfer.setData('text/plain', String(idx));
  evt.currentTarget.classList.add('dragging');
}

function onColDragOver(evt) {
  evt.preventDefault();
  evt.dataTransfer.dropEffect = 'move';
}

function onColDrop(evt) {
  evt.preventDefault();
  const targetIdx = parseInt(evt.currentTarget.dataset.colIndex, 10);
  const fromIdx = dragColIndex ?? parseInt(evt.dataTransfer.getData('text/plain'), 10);
  if (Number.isNaN(fromIdx) || Number.isNaN(targetIdx) || fromIdx === targetIdx) {
    dragColIndex = null;
    render();
    return;
  }
  const moved = columns.splice(fromIdx, 1)[0];
  columns.splice(targetIdx, 0, moved);
  save();
  render();
}

function onColDragEnd(evt) {
  dragColIndex = null;
  evt.currentTarget.classList.remove('dragging');
}

function deleteRow(ci) {
  if (!confirm('Delete this contact?')) return;
  selectedIds.delete(contacts[ci]?.id);
  contacts.splice(ci, 1);
  save();
  render();
}

function toggleSelect(ci, evt) {
  evt.stopPropagation();
  const id = contacts[ci].id;
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  render();
}

function toggleSelectAll(evt) {
  evt.stopPropagation();
  const shouldSelect = evt.target.checked;
  selectedIds = new Set(shouldSelect ? contacts.map(c => c.id) : []);
  render();
}

function deleteSelected() {
  if (selectedIds.size === 0) { alert('No rows selected.'); return; }
  if (!confirm(`Delete ${selectedIds.size} selected contact${selectedIds.size === 1 ? '' : 's'}?`)) return;
  contacts = contacts.filter(c => !selectedIds.has(c.id));
  selectedIds.clear();
  save();
  render();
}

function clearAllContacts() {
  if (contacts.length === 0) return;
  if (!confirm('Clear all contacts? This cannot be undone.')) return;
  contacts = [];
  selectedIds.clear();
  save();
  render();
}

function rerenderRow(ci) {
  const wasOpen = document.getElementById('row-' + ci)?.classList.contains('open');
  render();
  if (wasOpen) document.getElementById('row-' + ci)?.classList.add('open');
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text || '').then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
  });
}

function copyField(ci, col, btn) {
  copyText(contacts[ci].data[col] || '', btn);
}

async function createDrafts(ci) {
  const url = (localStorage.getItem('sheets_script_url') || '').trim();
  if (!url) { alert('Paste your Apps Script URL in the Sheets Script URL field first.'); return; }

  const c = contacts[ci];
  const btn = document.getElementById('drafts-' + ci);
  if (btn) { btn.textContent = 'Creating...'; btn.disabled = true; }

  const companyIdx = columns.findIndex(col => col.toLowerCase().includes('company'));
  const phoneIdx   = columns.findIndex(col => col.toLowerCase().includes('phone'));

  const payload = {
    action:    'createDrafts',
    scriptUrl: url,
    company:   companyIdx >= 0 ? c.data[columns[companyIdx]] || '' : '',
    phone:     phoneIdx   >= 0 ? c.data[columns[phoneIdx]]   || '' : '',
    sequences: c.sequences.map(s => ({
      to:      s.to || getEmail(c) || '',
      subject: s.subject || '',
      body:    s.body || ''
    }))
  };

  try {
    const getUrl = url + '?data=' + encodeURIComponent(JSON.stringify(payload));
    await fetch(getUrl, { method: 'GET', mode: 'no-cors' });
    if (btn) { btn.textContent = 'Drafts Created ✓'; btn.style.color = '#4caf7d'; }
    setTimeout(async () => {
      if (btn) { btn.textContent = 'Create Drafts'; btn.disabled = false; btn.style.color = ''; }
      await fetchOpens(); // refresh open data after creating drafts
    }, 3000);
  } catch (err) {
    if (btn) { btn.textContent = 'Failed'; btn.style.color = '#e05c5c'; }
    setTimeout(() => {
      if (btn) { btn.textContent = 'Create Drafts'; btn.disabled = false; btn.style.color = ''; }
    }, 3000);
  }
}

function openGmail(ci, si) {
  const seq = contacts[ci].sequences[si];
  const to      = encodeURIComponent(seq.to || getEmail(contacts[ci]) || '');
  const subject = encodeURIComponent(seq.subject || '');
  const body    = encodeURIComponent(seq.body || '');
  window.open(
    `https://mail.google.com/mail/?view=cm&to=${to}&su=${subject}&body=${body}`,
    '_blank'
  );
}

function openLink(ci, col) {
  const url = contacts[ci].data[col] || '';
  if (url) window.open(url, '_blank', 'noopener');
}

function backupJSON() {
  const data = { contacts, columns };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'outreach_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function restoreJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.contacts || !data.columns) throw new Error('Invalid backup file.');
      if (contacts.length > 0 && !confirm('This will replace your current data. Continue?')) return;
      contacts = data.contacts;
      columns = data.columns;
      save();
      render();
    } catch(err) {
      alert('Could not restore: ' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function exportCSV() {
  if (contacts.length === 0) { alert('No contacts to export.'); return; }

  // find max sequence count across all contacts
  const maxSeq = Math.max(...contacts.map(c => c.sequences.length));

  // build header row
  const seqCols = [];
  for (let i = 1; i <= maxSeq; i++) {
    seqCols.push(`subject${i}`, `email${i}`);
  }
  const headers = [...columns, 'outreach_status', ...seqCols];

  function csvCell(val) {
    const s = String(val ?? '');
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }

  const rows = contacts.map(c => {
    const base = columns.map(col => csvCell(c.data[col] || ''));
    base.push(csvCell(c.status));
    for (let i = 0; i < maxSeq; i++) {
      const seq = c.sequences[i];
      base.push(csvCell(seq ? seq.subject : ''), csvCell(seq ? seq.body : ''));
    }
    return base.join(',');
  });

  const csv = [headers.map(csvCell).join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'outreach_sequences.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// --- Open tracking helpers ---

function getContactOpen(ci, si) {
  if (!opensData.length) return null;
  const c = contacts[ci];
  const companyIdx = columns.findIndex(col => col.toLowerCase().includes('company'));
  const phoneIdx   = columns.findIndex(col => col.toLowerCase().includes('phone'));
  if (companyIdx === -1 || phoneIdx === -1) return null;
  const company = (c.data[columns[companyIdx]] || '').toLowerCase().trim();
  const phone   = (c.data[columns[phoneIdx]]   || '').toLowerCase().trim();
  return opensData.find(o =>
    o.company.toLowerCase().trim() === company &&
    o.phone.toLowerCase().trim()   === phone &&
    Number(o.seqIndex) === si + 1
  ) || null;
}

function buildTimeline(ci, c) {
  const rows = c.sequences.map((seq, si) => {
    const op = getContactOpen(ci, si);
    const hasContent = seq.subject || seq.body;
    let dotCls = 'empty', statusText = 'Empty', timeText = '';
    if (op && op.openCount > 0) {
      dotCls = 'opened';
      statusText = `Opened ${op.openCount}×`;
      if (op.lastOpenedAt) {
        const d = new Date(op.lastOpenedAt);
        timeText = `Last: ${d.toLocaleDateString()} ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
      }
    } else if (op) {
      dotCls = 'filled';
      statusText = hasContent ? 'Draft created — not opened yet' : 'Draft created';
    } else if (hasContent) {
      dotCls = 'filled';
      statusText = 'Filled — draft not created yet';
    }
    return `
      <div class="timeline-row">
        <div class="timeline-dot ${dotCls}"></div>
        <span class="timeline-seq">Email ${si + 1}</span>
        <span class="timeline-status ${dotCls === 'opened' ? 'opened' : ''}">${statusText}</span>
        <span class="timeline-time">${timeText}</span>
      </div>`;
  }).join('');

  return `
    <div class="open-timeline">
      <div class="open-timeline-label">Open Tracking</div>
      <div class="timeline-rows">${rows}</div>
    </div>`;
}

async function fetchOpens() {
  const url = (localStorage.getItem('sheets_script_url') || '').trim();
  if (!url) return;
  try {
    const res = await fetch(url + '?action=getOpens');
    const json = await res.json();
    opensData = json.opens || [];
    renderAnalytics();
    const openIds = [...document.querySelectorAll('.row-item.open')].map(el => el.id);
    render();
    openIds.forEach(id => document.getElementById(id)?.classList.add('open'));
  } catch(e) {
    console.warn('Could not fetch opens data:', e);
  }
}

function renderAnalytics() {
  const section = document.getElementById('analyticsSection');
  const content = document.getElementById('analyticsContent');
  if (!section || !content) return;

  if (!opensData.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';

  const total  = opensData.length;
  const opened = opensData.filter(o => o.openCount > 0).length;
  const rate   = total > 0 ? Math.round((opened / total) * 100) : 0;

  const seqStats = {};
  opensData.forEach(o => {
    const idx = Number(o.seqIndex);
    if (!seqStats[idx]) seqStats[idx] = { sent: 0, opens: 0 };
    seqStats[idx].sent++;
    if (o.openCount > 0) seqStats[idx].opens++;
  });
  const maxOpens = Math.max(...Object.values(seqStats).map(s => s.opens), 1);

  const barsHTML = Object.keys(seqStats).sort((a,b) => a-b).map(idx => {
    const s = seqStats[idx];
    const pct = Math.round((s.opens / maxOpens) * 100);
    return `
      <div class="seq-bar-row">
        <span class="seq-bar-label">Email ${idx}</span>
        <div class="seq-bar-track"><div class="seq-bar-fill" style="width:${pct}%"></div></div>
        <span class="seq-bar-count">${s.opens} / ${s.sent} opened</span>
      </div>`;
  }).join('');

  content.innerHTML = `
    <div class="analytics-stats">
      <div class="stat-box">
        <div class="stat-value">${total}</div>
        <div class="stat-label">Drafts sent</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" style="color:#4caf7d">${opened}</div>
        <div class="stat-label">Opened</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${rate}%</div>
        <div class="stat-label">Open rate</div>
      </div>
    </div>
    <div class="seq-bars">${barsHTML}</div>`;
}

render();

// Restore saved Sheets URL
const savedSheetsUrl = localStorage.getItem('sheets_script_url') || '';
const sheetsUrlInput = document.getElementById('sheetsUrl');
if (sheetsUrlInput && savedSheetsUrl) sheetsUrlInput.value = savedSheetsUrl;

const savedSheetName = localStorage.getItem('sheets_sheet_name') || '';
const sheetsNameInput = document.getElementById('sheetsName');
if (sheetsNameInput && savedSheetName) sheetsNameInput.value = savedSheetName;

// Fetch opens on load and auto-refresh every 60s
fetchOpens();
setInterval(fetchOpens, 60000);
</script>
