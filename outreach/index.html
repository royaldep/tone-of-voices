<!DOCTYPE html>
<html lang="en">
<head>

<title>Outreach Sequences</title>
<style>

  .btn-export-csv {

    border-radius: 6px;
    padding: 6px 14px;

  .btn-export-csv:hover { background: #4caf7d18; }
  .btn-backup {

  .btn-delete-selected {

<body>

<h1>📬 Outreach Sequences</h1>

<!-- Google Sheets sync -->
<div class="sheets-bar">
  <label>Sheets Script URL</label>
  <input type="text" id="sheetsUrl" placeholder="Paste your Apps Script web app URL here..."
    value="" oninput="localStorage.setItem('sheets_script_url', this.value)" style="flex:2">
  <input type="text" id="sheetsName" placeholder="Sheet name (e.g. SF 1840 10th Ave)"
    value="" oninput="localStorage.setItem('sheets_sheet_name', this.value)" style="flex:1">
  <span class="sheets-status" id="sheetsStatus"></span>
</div>

<!-- Paste zone -->
<div class="paste-zone">
  <label>Paste from Google Sheets (include header row) or import CSV</label>
  <textarea id="pasteArea" placeholder="Copy rows from Google Sheets and paste here..."></textarea>
  <div class="paste-actions">
    <button class="btn-import" onclick="importPaste()">Import Rows</button>
    <button class="btn-import-csv" onclick="document.getElementById('csvInput').click()">Import CSV</button>
    <button class="btn-clear-paste" onclick="clearPaste()">Clear</button>
    <input type="file" id="csvInput" accept=".csv,text/csv" style="display:none" onchange="importCSV(this)">
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <span class="row-count" id="rowCount">0 contacts</span>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <div style="display:flex;gap:6px;align-items:center">
      <input type="text" id="newColumnName" class="col-input" placeholder="New column"
        onkeydown="if(event.key==='Enter'){addColumn()}">
      <button class="btn-add-col" onclick="addColumn()">Add Column</button>
    </div>
    <button class="btn-backup" onclick="backupJSON()">Backup</button>
    <button class="btn-restore" onclick="document.getElementById('restoreInput').click()">Restore</button>
    <input type="file" id="restoreInput" accept=".json" style="display:none" onchange="restoreJSON(this)">
    <button class="btn-export-csv" onclick="exportCSV()">Export CSV</button>
    <button class="btn-delete-selected" onclick="deleteSelected()">Delete Selected</button>
    <button class="btn-clear-all" onclick="clearAllContacts()">Clear All</button>
    <button class="btn-add-row" onclick="addBlankRow()">+ Add Row</button>
  </div>
</div>

<div class="columns-bar" id="columnsBar"></div>

<!-- Table -->
<div class="table-wrap" id="tableWrap">
  <div class="table-header" id="tableHeader" style="display:none"></div>
  <div id="rowList">
    <div class="empty-state">No contacts yet — paste from Google Sheets or add a row manually.</div>
  </div>
</div>

<script>
let contacts = JSON.parse(localStorage.getItem('outreach_contacts') || '[]');
let columns = JSON.parse(localStorage.getItem('outreach_columns') || '["Name","Email","Company","Status"]');
let selectedIds = new Set();
let dragColIndex = null;

function save() {
  localStorage.setItem('outreach_contacts', JSON.stringify(contacts));
  localStorage.setItem('outreach_columns', JSON.stringify(columns));
}

function detectEmailCol() {
  return columns.findIndex(c => c.toLowerCase().includes('email'));
}

function detectNameCol() {
  return columns.findIndex(c => c.toLowerCase().includes('name'));
}

function importPaste() {
  const raw = document.getElementById('pasteArea').value.trim();
  if (!raw) return;
  const lines = raw.split('\n').map(l => l.split('\t'));
  if (lines.length < 1) return;

  // First row = headers
  const headers = lines[0].map(h => h.trim());
  columns = headers.length > 1 ? headers : columns;

  const rows = lines.slice(1);
  rows.forEach(cells => {
    if (cells.every(c => !c.trim())) return;
    const rowData = {};
    columns.forEach((col, i) => { rowData[col] = (cells[i] || '').trim(); });
    contacts.push({
      id: Date.now() + Math.random(),
      data: rowData,
      status: rowData['Status'] || 'not-started',
      sequences: defaultSequences(rowData)
    });
  });

  save();
  render();
  clearPaste();
}

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i + 1] === '"') { cell += '"'; i++; }
        else { inQuotes = false; }
      } else {
        cell += ch;
      }
      continue;
    }
    if (ch === '"') { inQuotes = true; continue; }
    if (ch === ',') { row.push(cell); cell = ''; continue; }
    if (ch === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; continue; }
    if (ch === '\r') { continue; }
    cell += ch;
  }
  row.push(cell);
  rows.push(row);
  while (rows.length && rows[rows.length - 1].every(c => !String(c).trim())) rows.pop();
  return rows;
}

function importCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const rows = parseCSV(String(e.target.result || ''));
    if (rows.length < 1) return;
    const headers = rows[0].map(h => String(h || '').trim());
    const headerIndex = {};
    headers.forEach((h, i) => { if (h && headerIndex[h] == null) headerIndex[h] = i; });

    const statusIdx = headers.findIndex(h => h.toLowerCase() === 'outreach_status');
    const seqCols = {};
    let maxSeq = 0;
    headers.forEach((h, i) => {
      const m = h.match(/^(subject|email)(\d+)$/i);
      if (!m) return;
      const idx = parseInt(m[2], 10);
      maxSeq = Math.max(maxSeq, idx);
      const key = m[1].toLowerCase();
      if (!seqCols[idx]) seqCols[idx] = {};
      seqCols[idx][key] = i;
    });

    const baseColumns = headers.filter((h, i) => {
      if (!h) return false;
      if (i === statusIdx) return false;
      if (/^(subject|email)\d+$/i.test(h)) return false;
      return true;
    });
    if (baseColumns.length > 0) columns = baseColumns;

    rows.slice(1).forEach(cells => {
      if (cells.every(c => !String(c).trim())) return;
      const rowData = {};
      columns.forEach(col => {
        const idx = headerIndex[col];
        rowData[col] = idx != null ? String(cells[idx] ?? '').trim() : '';
      });
      let status = 'not-started';
      if (statusIdx >= 0) status = String(cells[statusIdx] ?? '').trim() || 'not-started';
      else {
        const statusCol = columns.find(c => c.toLowerCase() === 'status');
        if (statusCol) status = String(rowData[statusCol] || '').trim() || 'not-started';
      }

      let sequences = [];
      if (maxSeq > 0) {
        const emailIdx = detectEmailCol();
        const toEmail = emailIdx >= 0 ? rowData[columns[emailIdx]] || '' : '';
        for (let i = 1; i <= maxSeq; i++) {
          const subjectIdx = seqCols[i]?.subject;
          const bodyIdx = seqCols[i]?.email;
          sequences.push({
            id: Date.now() + Math.random(),
            subject: subjectIdx != null ? String(cells[subjectIdx] ?? '').trim() : '',
            body: bodyIdx != null ? String(cells[bodyIdx] ?? '').trim() : '',
            to: toEmail
          });
        }
      } else {
        sequences = defaultSequences(rowData);
      }

      contacts.push({
        id: Date.now() + Math.random(),
        data: rowData,
        status: status,
        sequences: sequences
      });
    });

    save();
    render();
    input.value = '';
  };
  reader.readAsText(file);
}

function defaultSequences(rowData) {
  const emailIdx = detectEmailCol();
  const email = emailIdx >= 0 ? rowData[columns[emailIdx]] || '' : '';
  return [1,2,3,4].map(n => ({
    id: n,
    subject: '',
    body: '',
    to: email
  }));
}

function clearPaste() {
  document.getElementById('pasteArea').value = '';
}

function addBlankRow() {
  const rowData = {};
  columns.forEach(c => rowData[c] = '');
  contacts.push({
    id: Date.now() + Math.random(),
    data: rowData,
    status: 'not-started',
    sequences: defaultSequences(rowData)
  });
  save();
  render();
  // auto-open the new row
  setTimeout(() => {
    const items = document.querySelectorAll('.row-item');
    if (items.length) toggleRow(items[items.length - 1]);
  }, 50);
}

function toggleRow(el) {
  el.classList.toggle('open');
}

function getEmail(contact) {
  const idx = detectEmailCol();
  return idx >= 0 ? contact.data[columns[idx]] || '' : '';
}

function getName(contact) {
  const idx = detectNameCol();
  return idx >= 0 ? contact.data[columns[idx]] || '(no name)' : Object.values(contact.data)[0] || '(no name)';
}

function statusClass(s) {
  const map = { 'not-started':'not-started','in-progress':'in-progress','sent':'sent','replied':'replied' };
  return 'status-' + (map[s] || 'not-started');
}
function statusLabel(s) {
  const map = { 'not-started':'Not Started','in-progress':'In Progress','sent':'Sent','replied':'Replied' };
  return map[s] || s;
}

function render() {
  const listEl = document.getElementById('rowList');
  const headerEl = document.getElementById('tableHeader');
  const countEl = document.getElementById('rowCount');
  const columnsBar = document.getElementById('columnsBar');
  countEl.textContent = contacts.length + ' contact' + (contacts.length !== 1 ? 's' : '');

  if (columnsBar) {
    columnsBar.innerHTML = columns.map((c, i) =>
      `<span class="col-pill" draggable="true" data-col-index="${i}"
        ondragstart="onColDragStart(event)"
        ondragover="onColDragOver(event)"
        ondrop="onColDrop(event)"
        ondragend="onColDragEnd(event)">${escHtml(c)}</span>`
    ).join('');
  }

  if (contacts.length === 0) {
    listEl.innerHTML = '<div class="empty-state">No contacts yet — paste from Google Sheets or add a row manually.</div>';
    headerEl.style.display = 'none';
    return;
  }

  // header
  const colCount = columns.length;
  const gridCols = `32px 28px repeat(${Math.min(colCount, 4)}, 1fr) 80px 50px 24px`;
  headerEl.style.display = 'grid';
  headerEl.style.gridTemplateColumns = gridCols;
  headerEl.innerHTML =
    '<span>#</span>' +
    '<span class="row-select"><input type="checkbox" onchange="toggleSelectAll(event)"></span>' +
    columns.slice(0, 4).map((c, i) =>
      `<span class="col-draggable" draggable="true" data-col-index="${i}"
        ondragstart="onColDragStart(event)"
        ondragover="onColDragOver(event)"
        ondrop="onColDrop(event)"
        ondragend="onColDragEnd(event)">${c}</span>`
    ).join('') +
    '<span>Status</span><span>Emails</span><span></span>';
  const selectAllEl = headerEl.querySelector('input[type="checkbox"]');
  if (selectAllEl) {
    selectAllEl.checked = contacts.length > 0 && selectedIds.size === contacts.length;
    selectAllEl.indeterminate = selectedIds.size > 0 && selectedIds.size < contacts.length;
  }

  listEl.innerHTML = contacts.map((c, ci) => {
    const email = getEmail(c);
    const nameCells = columns.slice(0, 4).map(col => {
      const isEmail = col.toLowerCase().includes('email');
      return `<div class="cell ${isEmail ? 'email' : ''}">${c.data[col] || '—'}</div>`;
    }).join('');

    const seqHTML = c.sequences.map((seq, si) => `
      <div class="email-box" data-ci="${ci}" data-si="${si}">
        <div class="email-box-header">
          <span class="email-box-num">Email ${si + 1}</span>
          <div style="display:flex;gap:4px;align-items:center">
            <button class="copy-btn" onclick="copyText(contacts[${ci}].sequences[${si}].subject,this)" title="Copy subject">Subj</button>
            <button class="copy-btn" onclick="copyText(contacts[${ci}].sequences[${si}].body,this)" title="Copy body">Body</button>
            <button class="btn-remove-email" onclick="removeSeq(${ci},${si})" title="Remove">✕</button>
          </div>
        </div>
        <div class="email-box-subject">
          <input type="text" placeholder="Subject line..." value="${escHtml(seq.subject)}"
            oninput="contacts[${ci}].sequences[${si}].subject=this.value">
        </div>
        <textarea placeholder="Write your email body here..."
          oninput="contacts[${ci}].sequences[${si}].body=this.value">${escHtml(seq.body)}</textarea>
      </div>
    `).join('');

    const fieldInputs = columns.map(col => {
      const val = c.data[col] || '';
      const isLink = /^https?:\/\//i.test(val);
      return `
      <div class="field-group">
        <div class="field-label-row">
          <label>${col}</label>
          <div style="display:flex;gap:3px;align-items:center">
            ${isLink ? `<button class="copy-btn link-btn" onclick="openLink(${ci},'${escHtml(col)}')" title="Open link">↗</button>` : ''}
            <button class="copy-btn" onclick="copyField(${ci},'${escHtml(col)}',this)">Copy</button>
          </div>
        </div>
        <input type="text" value="${escHtml(val)}"
          oninput="contacts[${ci}].data['${escHtml(col)}']=this.value${col.toLowerCase().includes('email') ? `;syncEmail(${ci})` : ''}">
      </div>`;
    }).join('');

    const rowNum = ci + 1;
    const checked = selectedIds.has(c.id) ? 'checked' : '';
    return `
    <div class="row-item ${selectedIds.has(c.id) ? 'selected' : ''}" id="row-${ci}">
      <div class="row-summary" style="grid-template-columns:${gridCols}" onclick="toggleRow(this.parentElement)">
        <div class="cell row-num">${rowNum}</div>
        <div class="cell row-select"><input type="checkbox" ${checked} onchange="toggleSelect(${ci}, event)"></div>
        ${nameCells}
        <div class="cell">
          <span class="status-badge ${statusClass(c.status)}">${statusLabel(c.status)}</span>
        </div>
        <div class="cell">
          <div class="email-dots" title="${c.sequences.filter(s=>s.subject||s.body).length} of ${c.sequences.length} emails filled">
            ${c.sequences.map(s => `<div class="email-dot ${s.subject && s.body ? 'filled' : s.subject || s.body ? 'partial' : ''}"></div>`).join('')}
          </div>
        </div>
        <div class="expand-icon">▼</div>
      </div>
      <div class="row-detail">
        <div class="detail-grid">
          ${fieldInputs}
          <div class="field-group">
            <label>Status</label>
            <select onchange="contacts[${ci}].status=this.value;rerenderRow(${ci})">
              ${['not-started','in-progress','sent','replied'].map(s =>
                `<option value="${s}" ${c.status===s?'selected':''}>${statusLabel(s)}</option>`
              ).join('')}
            </select>
          </div>
        </div>
        <div class="seq-header">
          <span class="seq-label">Email Sequence (${c.sequences.length})</span>
          <button class="btn-add-email" onclick="addSeq(${ci})">+ Add Email</button>
        </div>
        <div class="email-boxes">${seqHTML}</div>
        <div class="row-actions">
          <span class="save-flash" id="flash-${ci}">Saved ✓</span>
          <button class="btn-delete-row" onclick="deleteRow(${ci})">Delete</button>
          <button class="btn-save" onclick="saveRow(${ci})">Save</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function syncEmail(ci) {
  const email = getEmail(contacts[ci]);
  contacts[ci].sequences.forEach(s => s.to = email);
}

function addSeq(ci) {
  const email = getEmail(contacts[ci]);
  contacts[ci].sequences.push({ id: Date.now(), subject: '', body: '', to: email });
  save();
  const wasOpen = document.getElementById('row-' + ci)?.classList.contains('open');
  render();
  if (wasOpen) document.getElementById('row-' + ci)?.classList.add('open');
}

function removeSeq(ci, si) {
  if (contacts[ci].sequences.length <= 1) return;
  contacts[ci].sequences.splice(si, 1);
  save();
  const wasOpen = document.getElementById('row-' + ci)?.classList.contains('open');
  render();
  if (wasOpen) document.getElementById('row-' + ci)?.classList.add('open');
}

function saveRow(ci) {
  save();
  rerenderRow(ci);
  const flash = document.getElementById('flash-' + ci);
  if (flash) { flash.classList.add('show'); setTimeout(() => flash.classList.remove('show'), 1800); }
  syncToSheets(ci);
}

async function syncToSheets(ci) {
  const url = (localStorage.getItem('sheets_script_url') || '').trim();
  if (!url) return;

  const c = contacts[ci];
  const companyIdx = columns.findIndex(col => col.toLowerCase().includes('company'));
  const phoneIdx   = columns.findIndex(col => col.toLowerCase().includes('phone'));

  if (companyIdx === -1 || phoneIdx === -1) return;

  const statusEl = document.getElementById('sheetsStatus');
  if (statusEl) { statusEl.textContent = 'Syncing...'; statusEl.className = 'sheets-status syncing'; }

  const sheetName = (localStorage.getItem('sheets_sheet_name') || '').trim();
  const payload = {
    company:   c.data[columns[companyIdx]] || '',
    phone:     c.data[columns[phoneIdx]]   || '',
    sheetName: sheetName,
    sequences: c.sequences.map((s, i) => ({
      index:   i + 1,
      subject: s.subject || '',
      body:    s.body    || ''
    }))
  };

  try {
    const form = new URLSearchParams({ data: JSON.stringify(payload) });
    await fetch(url, {
      method: 'POST',
      mode: 'no-cors',
      body: form
    });
    if (statusEl) { statusEl.textContent = 'Synced ✓'; statusEl.className = 'sheets-status ok'; }
    setTimeout(() => { if (statusEl) { statusEl.textContent = ''; statusEl.className = 'sheets-status'; } }, 3000);
  } catch (err) {
    if (statusEl) { statusEl.textContent = 'Sync failed'; statusEl.className = 'sheets-status err'; }
    console.error('Sheets sync error:', err);
  }
}

function addColumn() {
  const input = document.getElementById('newColumnName');
  if (!input) return;
  const name = input.value.trim();
  if (!name) return;
  const exists = columns.some(c => c.toLowerCase() === name.toLowerCase());
  if (exists) { alert('Column already exists.'); return; }
  columns.push(name);
  contacts.forEach(c => {
    if (!Object.prototype.hasOwnProperty.call(c.data, name)) c.data[name] = '';
  });
  save();
  render();
  input.value = '';
}

function onColDragStart(evt) {
  const idx = parseInt(evt.currentTarget.dataset.colIndex, 10);
  if (Number.isNaN(idx)) return;
  dragColIndex = idx;
  evt.dataTransfer.effectAllowed = 'move';
  evt.dataTransfer.setData('text/plain', String(idx));
  evt.currentTarget.classList.add('dragging');
}

function onColDragOver(evt) {
  evt.preventDefault();
  evt.dataTransfer.dropEffect = 'move';
}

function onColDrop(evt) {
  evt.preventDefault();
  const targetIdx = parseInt(evt.currentTarget.dataset.colIndex, 10);
  const fromIdx = dragColIndex ?? parseInt(evt.dataTransfer.getData('text/plain'), 10);
  if (Number.isNaN(fromIdx) || Number.isNaN(targetIdx) || fromIdx === targetIdx) {
    dragColIndex = null;
    render();
    return;
  }
  const moved = columns.splice(fromIdx, 1)[0];
  columns.splice(targetIdx, 0, moved);
  save();
  render();
}

function onColDragEnd(evt) {
  dragColIndex = null;
  evt.currentTarget.classList.remove('dragging');
}

function deleteRow(ci) {
  if (!confirm('Delete this contact?')) return;
  selectedIds.delete(contacts[ci]?.id);
  contacts.splice(ci, 1);
  save();
  render();
}

function toggleSelect(ci, evt) {
  evt.stopPropagation();
  const id = contacts[ci].id;
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  render();
}

function toggleSelectAll(evt) {
  evt.stopPropagation();
  const shouldSelect = evt.target.checked;
  selectedIds = new Set(shouldSelect ? contacts.map(c => c.id) : []);
  render();
}

function deleteSelected() {
  if (selectedIds.size === 0) { alert('No rows selected.'); return; }
  if (!confirm(`Delete ${selectedIds.size} selected contact${selectedIds.size === 1 ? '' : 's'}?`)) return;
  contacts = contacts.filter(c => !selectedIds.has(c.id));
  selectedIds.clear();
  save();
  render();
}

function clearAllContacts() {
  if (contacts.length === 0) return;
  if (!confirm('Clear all contacts? This cannot be undone.')) return;
  contacts = [];
  selectedIds.clear();
  save();
  render();
}

function rerenderRow(ci) {
  const wasOpen = document.getElementById('row-' + ci)?.classList.contains('open');
  render();
  if (wasOpen) document.getElementById('row-' + ci)?.classList.add('open');
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text || '').then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
  });
}

function copyField(ci, col, btn) {
  copyText(contacts[ci].data[col] || '', btn);
}

function openLink(ci, col) {
  const url = contacts[ci].data[col] || '';
  if (url) window.open(url, '_blank', 'noopener');
}

function backupJSON() {
  const data = { contacts, columns };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'outreach_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function restoreJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.contacts || !data.columns) throw new Error('Invalid backup file.');
      if (contacts.length > 0 && !confirm('This will replace your current data. Continue?')) return;
      contacts = data.contacts;
      columns = data.columns;
      save();
      render();
    } catch(err) {
      alert('Could not restore: ' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function exportCSV() {
  if (contacts.length === 0) { alert('No contacts to export.'); return; }

  // find max sequence count across all contacts
  const maxSeq = Math.max(...contacts.map(c => c.sequences.length));

  // build header row
  const seqCols = [];
  for (let i = 1; i <= maxSeq; i++) {
    seqCols.push(`subject${i}`, `email${i}`);
  }
  const headers = [...columns, 'outreach_status', ...seqCols];

  function csvCell(val) {
    const s = String(val ?? '');
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }

  const rows = contacts.map(c => {
    const base = columns.map(col => csvCell(c.data[col] || ''));
    base.push(csvCell(c.status));
    for (let i = 0; i < maxSeq; i++) {
      const seq = c.sequences[i];
      base.push(csvCell(seq ? seq.subject : ''), csvCell(seq ? seq.body : ''));
    }
    return base.join(',');
  });

  const csv = [headers.map(csvCell).join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'outreach_sequences.csv';
  a.click();
  URL.revokeObjectURL(url);
}

render();

// Restore saved Sheets URL
const savedSheetsUrl = localStorage.getItem('sheets_script_url') || '';
const sheetsUrlInput = document.getElementById('sheetsUrl');
if (sheetsUrlInput && savedSheetsUrl) sheetsUrlInput.value = savedSheetsUrl;

const savedSheetName = localStorage.getItem('sheets_sheet_name') || '';
const sheetsNameInput = document.getElementById('sheetsName');
if (sheetsNameInput && savedSheetName) sheetsNameInput.value = savedSheetName;
</script>
